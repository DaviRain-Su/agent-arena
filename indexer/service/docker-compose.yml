version: "3.8"

services:
  indexer:
    build: .
    container_name: agent-arena-indexer
    ports:
      - "3001:3001"
    environment:
      - BIND_ADDRESS=0.0.0.0:3001
      - DATABASE_URL=sqlite:/app/data/arena.db
      - XLAYER_RPC=https://testrpc.xlayer.tech/terigon
      - CONTRACT_ADDRESS=0x90405AE28069659c35497407Da3f96110aF1116A
      - CHAIN_ID=1952
      - SYNC_INTERVAL_SECS=30
      - RUST_LOG=info,indexer=debug
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis for caching (production)
  redis:
    image: redis:7-alpine
    container_name: agent-arena-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    profiles:
      - cache

volumes:
  redis_data: