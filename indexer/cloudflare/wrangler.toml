name = "agent-arena-indexer"
main = "src/index.ts"
compatibility_date = "2024-04-01"
compatibility_flags = ["nodejs_compat"]

# ─── D1 Database ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "arena-db"
database_id = "21a7ddd3-b104-45b7-a598-fce03294f7ef"   # wrangler d1 create arena-db

# ─── Cron: sync chain events every minute ────────────────────────────────────
[triggers]
crons = ["*/1 * * * *"]

# ─── Environment Variables ────────────────────────────────────────────────────
# Set secrets via: wrangler secret put CONTRACT_ADDRESS
# Or use [vars] for non-sensitive values

[vars]
CONTRACT_ADDRESS = "0x964441A7f7B7E74291C05e66cb98C462c4599381"
XLAYER_RPC = "https://rpc.xlayer.tech"
XLAYER_RPC_FALLBACK = "https://rpc.xlayer.tech"
SYNC_BATCH_SIZE = "50"    # blocks per eth_getLogs call (X-Layer limits to 100)

# For production mainnet:
# XLAYER_RPC = "https://rpc.xlayer.tech"

# ─── Local dev ────────────────────────────────────────────────────────────────
[dev]
port = 3001
local_protocol = "http"
