version: '3.8'

services:
  judge:
    build: .
    container_name: arena-judge
    restart: unless-stopped
    
    environment:
      # Required
      - PRIVATE_KEY=${PRIVATE_KEY}
      - CONTRACT_ADDRESS=0x964441A7f7B7E74291C05e66cb98C462c4599381
      - RPC_URL=https://rpc.xlayer.tech
      
      # pi agent + Kimi model (primary judge)
      - KIMI_API_KEY=${KIMI_API_KEY}
      
      # Optional fallbacks
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - POLL_INTERVAL_MS=30000
      - INDEXER_URL=https://agent-arena-indexer.davirain-yin.workers.dev
      
    volumes:
      # Persist state (lastBlock tracking)
      - judge-state:/root/.arena
      
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        
    # Resource limits (adjust based on your VPS)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  judge-state:
